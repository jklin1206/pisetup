# Nebula Focus tmux cockpit
# Top status bar to match Pi's Π header and Ghostty Nebula palette.

set -s escape-time 0
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:RGB"
set -g focus-events on
set -g mouse on

# Preserve cwd when creating panes/windows
bind \\ split-window -h -c "#{pane_current_path}"
bind Enter split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Useful basics, without taking over your whole workflow
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g mode-keys vi

# Pane borders
set -g pane-border-style "fg=#30363d"
set -g pane-active-border-style "fg=#58a6ff"

# Top cockpit bar
set -g status on
set -g status-position top
set -g status-style "bg=#010409,fg=#8b949e"
set -g status-left-length 64
set -g status-right-length 96
set -g status-justify left

# Left: session + directory
set -g status-left "#[fg=#76e3ea,bold] Π #[fg=#58a6ff]#S #[fg=#6e7681]█ #[fg=#8b949e]#{pane_current_path} "

# Windows: compact tabs with active glow
setw -g window-status-format "#[fg=#6e7681] #I #[fg=#8b949e]#W "
setw -g window-status-current-format "#[bg=#1f2f4a,fg=#76e3ea,bold] #I #[fg=#e6edf3]#W #[default]"
setw -g window-status-separator "#[fg=#30363d]│"

# Right: git branch, time, host
set -g status-right "#[fg=#6e7681]█ #[fg=#bc8cff]#(git -C #{pane_current_path} branch --show-current 2>/dev/null | sed 's/^/git /') #[fg=#6e7681]· #[fg=#79c0ff]%H:%M #[fg=#6e7681]· #[fg=#7ee787]#h "

# Message / copy mode styling
set -g message-style "bg=#1f2f4a,fg=#e6edf3"
set -g mode-style "bg=#1f2f4a,fg=#e6edf3"

# Reload
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Nebula tmux cockpit reloaded"
